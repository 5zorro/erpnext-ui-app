<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Launcher</title>
  <style>
    body { margin: 0; font-family: system-ui, "Segoe UI", Roboto, sans-serif; background: #eef2f5; color: #1f2d3d; }
    main { max-width: 40rem; padding: 32px; }
    h1 { font-size: 1.35rem; margin: 0 0 0.5rem; }
    p { line-height: 1.5; color: #546e7a; }
    code { background: #dfe6e9; padding: 0.1em 0.35em; border-radius: 4px; }
    .tiles {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(9.5rem, 1fr));
      gap: 10px; margin-top: 1.25rem;
    }
    .tiles button {
      background: #2c3e50; color: #fff; border: none; border-radius: 8px;
      padding: 14px 12px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: left;
      min-height: 3.25rem;
    }
    .tiles button:hover { background: #1a252f; }
    .hint { margin-top: 1.5rem; font-size: 13px; padding: 12px 14px; background: #fff; border-radius: 8px; border: 1px solid #d6dee6; line-height: 1.45; }
  </style>
</head>
<body>
  <main>
    <h1>Launcher</h1>
    <p>
      Shortcuts into <strong>unmodified ERPNext</strong>. Toolbar <strong>Home</strong> opens the site root
      (<code>/</code>); <strong>Launcher</strong> returns here. Use <strong>ERP console</strong> when
      dogfooding to Inspect / copy console errors.
    </p>
    <p>Server: <code id="erp-base" data-testid="erp-base">…</code></p>
    <div class="tiles" id="tiles" data-testid="home-tiles" role="navigation" aria-label="Workflow tiles"></div>
    <div class="hint">
      If <strong>DB ✗</strong> in the toolbar, start the stack first, then open Desk again.
      Doc skin arrives in milestone M3.
    </div>
  </main>
  <script type="module">
    import { HOME_TILES } from "../src/home-tiles.js";

    const api = window.erpHome;
    const root = document.getElementById("tiles");

    for (const t of HOME_TILES) {
      const b = document.createElement("button");
      b.type = "button";
      b.textContent = t.label;
      b.dataset.testid = `tile-${t.id}`;
      b.dataset.route = t.route;
      b.title = t.route;
      b.onclick = () => api && api.openErp(t.route);
      root.appendChild(b);
    }

    if (api) {
      api.getConfig().then((c) => {
        document.getElementById("erp-base").textContent = c.erpBase || "";
      });
    }
  </script>
</body>
</html>
