<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Doc Workflow Home</title>
  <style>
    body { margin: 0; font-family: system-ui, "Segoe UI", Roboto, sans-serif; background: #eef2f5; color: #1f2d3d; }
    h1 { font-size: 15px; margin: 16px 22px 2px; color: #2c3e50; font-weight: 600; }
    .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 12px 20px 24px; max-width: 1120px; margin: 0 auto; }
    .col { display: flex; flex-direction: column; gap: 18px; }
    .box { background: #fff; border: 1px solid #d6dee6; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .box h3 { margin: 0; padding: 9px 14px; background: #2c3e50; color: #fff; font-size: 13px; letter-spacing: .4px; text-transform: uppercase; }
    .items { display: flex; flex-wrap: wrap; gap: 10px; padding: 14px; }
    .item {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 98px; height: 76px; border: 1px solid #e1e8ee; border-radius: 8px;
      background: #f8fafc; cursor: pointer; font-size: 12px; text-align: center; padding: 6px;
    }
    .item:hover { background: #eaf4ff; border-color: #69b1ff; }
    .item .ic { font-size: 20px; margin-bottom: 5px; line-height: 1; }
    .item.disabled { opacity: .42; cursor: not-allowed; }
    @media (max-width: 720px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1 data-testid="home-title">Doc Workflow Home</h1>
  <div class="wrap" data-testid="home-tiles">
    <div class="col" id="left"></div>
    <div class="col" id="right"></div>
  </div>
  <script type="module">
    import { HOME_GROUPS } from "../src/home-tiles.js";

    const api = window.erpHome;

    function render(groups, el) {
      for (const g of groups) {
        const box = document.createElement("div");
        box.className = "box";
        box.dataset.testid = `group-${g.id}`;
        const h = document.createElement("h3");
        h.textContent = g.title;
        box.appendChild(h);
        const wrap = document.createElement("div");
        wrap.className = "items";
        for (const t of g.tiles) {
          const b = document.createElement("div");
          b.className = "item" + (t.disabled ? " disabled" : "");
          b.dataset.testid = `tile-${t.id}`;
          b.innerHTML = `<div class="ic">${t.icon || ""}</div>${t.label}`;
          if (t.disabled) {
            b.title = "Requires an ERP module that may not be installed";
          } else if (t.id === "bill-new" && api.openEntry) {
            b.title = "Enter Bills (last lens; default Doc)";
            b.onclick = () => api.openEntry("purchase-invoice");
          } else if (t.id === "po-new" && api.openEntry) {
            b.title = "Purchase Orders (last lens; default Doc)";
            b.onclick = () => api.openEntry("purchase-order");
          } else if (t.id === "receipt-new" && api.openEntry) {
            b.title = "Receive Inventory (last lens; default Doc)";
            b.onclick = () => api.openEntry("purchase-receipt");
          } else {
            b.title = t.route;
            b.onclick = () => api && api.openErp(t.route);
          }
          wrap.appendChild(b);
        }
        box.appendChild(wrap);
        el.appendChild(box);
      }
    }

    render(HOME_GROUPS.left, document.getElementById("left"));
    render(HOME_GROUPS.right, document.getElementById("right"));
  </script>
</body>
</html>
