<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>History</title>
  <style>
    html, body { margin: 0; height: 100%; background: #1a252f; color: #cbd5e1; font-family: system-ui, "Segoe UI", Roboto, sans-serif; }
    .head {
      padding: 10px 12px 6px; font-size: 10px; letter-spacing: .6px; text-transform: uppercase;
      color: #6b8299; border-bottom: 1px solid #2c3e50;
    }
    ul { list-style: none; margin: 0; padding: 6px; }
    li button {
      width: 100%; text-align: left; border: none; background: transparent; color: #cbd5e1;
      padding: 8px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
    }
    li button:hover { background: #2c3e50; color: #fff; }
    .empty { padding: 14px 12px; font-size: 12px; color: #6b8299; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="head">Recent</div>
  <div class="empty" id="empty">Open Desk and visit forms — each doctype appears once here.</div>
  <ul id="list" hidden></ul>
  <script>
    const listEl = document.getElementById("list");
    const emptyEl = document.getElementById("empty");
    const api = window.erpHist;

    function render(items) {
      const rows = Array.isArray(items) ? items : [];
      listEl.innerHTML = "";
      if (!rows.length) {
        emptyEl.hidden = false;
        listEl.hidden = true;
        return;
      }
      emptyEl.hidden = true;
      listEl.hidden = false;
      rows.forEach((h) => {
        const li = document.createElement("li");
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = h.label || h.dt;
        b.title = h.route || "";
        b.onclick = () => api && api.openErp(h.route);
        li.appendChild(b);
        listEl.appendChild(li);
      });
    }

    if (api) api.onHistory(render);
    render([]);
  </script>
</body>
</html>
