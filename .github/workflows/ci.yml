name: CI

on:
  push:
    branches: [main, alpha]
  pull_request:
    branches: [main, alpha]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run unit tests (no ERPNext required)
        run: npm test
